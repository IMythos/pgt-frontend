<div class="flex flex-col items-start p-10 gap-10 w-full min-h-full transition-colors duration-300">
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center w-full gap-4">
    <div class="flex flex-col">
      <h2 class="font-['Work_Sans'] font-bold text-3xl text-[#111D23] dark:text-white transition-colors">
        Dashboard Principal
      </h2>
      <p class="font-['Inter'] text-sm text-[#4C616C] dark:text-[#8A9BA8] transition-colors">
        Vista general de métricas, alertas y flujo operativo del sistema.
      </p>
    </div>
    <div class="flex items-center gap-3">
      <button (click)="loadAllData()"
        class="flex items-center gap-2 px-4 py-2.5 bg-white dark:bg-[#0A0A0A] border border-gray-200 dark:border-[#1F1F1F] text-[#111D23] dark:text-white font-['Inter'] font-semibold text-sm rounded-lg hover:bg-gray-50 dark:hover:bg-[#141414] transition-colors shadow-sm cursor-pointer"
        [class.opacity-50]="loading()"
        [disabled]="loading()">
        <svg class="w-4 h-4" [class.animate-spin]="loading()" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        {{ loading() ? 'Cargando...' : 'Actualizar Datos' }}
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 w-full max-w-[1583px]">
    @for (kpi of kpis(); track kpi.id) {
      <app-kpi-card [kpi]="kpi" />
    }
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-[2.6fr_1.3fr] gap-6 w-full max-w-[1583px]">
    <app-movimientos-area-chart [data]="movements()" />
    <app-proporcion-donut-chart [data]="proporciones()" />
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-[1fr_1.1fr] gap-6 w-full max-w-[1583px]">
    <app-stock-alerts-widget [data]="stockAlerts()" />
    <app-top-products-chart [data]="topProducts()" />
  </div>

  <div class="flex flex-col lg:flex-row items-stretch gap-6 w-full max-w-[1588px]">
    <div class="w-full lg:w-[71%]">
      <app-ultimas-operaciones-widget [data]="operations()" />
    </div>
    <div class="w-full lg:w-[29%]">
      <app-capacidad-zona-widget [data]="zoneCapacities()" />
    </div>
  </div>
</div>
